workflows:
  android-debug-build:
    name: Android Debug Build
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Unzip and build APK
        script: |
          unzip territorial_tactical_ai_v4.zip
          cd territorial_tactical_ai
          brew install gradle
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - territorial_tactical_ai/app/build/outputs/apk/**/*.apk
